spring.application.name=ambiente-teste-api
server.port=8080

# API
api.version=api/v1

# JSON
spring.jackson.default-property-inclusion=non-null
spring.jackson.time-zone=America/Sao_Paulo

# Datasource
spring.datasource.url=jdbc:postgresql://${SQL_DB_HOST:localhost}:${SQL_DB_PORT:5432}/${SQL_DB_NAME:ambiente-teste}
spring.datasource.username=${SQL_DB_USER:postgres}
spring.datasource.password=${SQL_DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Connection pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# OpenAPI / Swagger
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/${api.version}/api-docs
springdoc.api-docs.version=openapi_3_0
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/${api.version}/swagger-ui.html
springdoc.swagger-ui.config-url=/${api.version}/api-docs/swagger-config
springdoc.swagger-ui.url=/${api.version}/api-docs
springdoc.swagger-ui.operations-sorter=method

# Logging
logging.level.root=INFO
logging.level.br.com.estudos.ambienteteste=DEBUG
